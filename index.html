<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime World</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:#151515;
    position:sticky;
    top:0;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ff2e63;
}

.search-box input{
    padding:10px;
    width:250px;
    border:none;
    outline:none;
    border-radius:8px;
}

.hero{
    height:350px;
    background:url('https://images6.alphacoders.com/413/413205.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    padding:40px;
}

.hero-content{
    background:rgba(0,0,0,0.6);
    padding:20px;
    border-radius:15px;
    max-width:400px;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;
}

.hero p{
    margin-bottom:20px;
}

.watch-btn{
    padding:12px 25px;
    background:#ff2e63;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.section{
    padding:30px 20px;
}

.section h2{
    margin-bottom:20px;
}

.anime-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:20px;
}

.card{
    background:#1b1b1b;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:230px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    font-size:16px;
}

footer{
    text-align:center;
    padding:20px;
    background:#151515;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
    <div class="logo">AnimeWorld</div>

    <div class="search-box">
        <input type="text" placeholder="Search Anime...">
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h1>Naruto Shippuden</h1>
        <p>Watch the best anime episodes in HD quality.</p>
        <button class="watch-btn">Watch Now</button>
    </div>
</section>

<section class="section">
    <h2>Recommended Anime</h2>

    <div class="anime-grid">
 
        <a href="naruto.html">
        <div class="card">
            <img src="images\abydco272-naruto-poster.webp">
            <h3>Naruto</h3>
        </div>
        </a>

        <a href="one-piece.html">
        <div class="card">
            <img src="https://cdn.myanimelist.net/images/anime/6/73245.jpg">
            <h3>One Piece</h3>
        </div>
        </a>

        <a href="attack-on-titan.html">
        <div class="card">
            <img src="images\Attack_on_Titan_Season_1.webp">
            <h3>Attack On Titan</h3>
        </div>
        </a>

        <a href="demon-slayer.html">
        <div class="card">
            <img src="images\41gP+S8QQXL._AC_UF894,1000_QL80_.jpg" alt="Demon Slayer">
            <h3>Demon Slayer</h3>
        </div>
        </a>

        <a href="jujutsu-kaisen.html">
        <div class="card">
            <img src="images\images (2).jpg" alt="Jujutsu Kaisen">
            <h3>Jujutsu Kaisen</h3>
        </div>
        </a>

        <a href="bleach.html">
        <div class="card">
            <img src="images\images (1).jpg" alt="Bleach">
            <h3>Bleach</h3>
        </div>
        </a>

    </div>

    <h1>Naruto Episodes</h1>

<!-- 🎬 Video Player -->
<video id="player" controls width="100%">
  <source src="https://res.cloudinary.com/your-cloud/video/upload/episode1.mp4" type="video/mp4">
</video>

<hr>

<!-- 📺 Episode List -->
<h3>Episodes</h3>

<button onclick="playEpisode(0)">Episode 1</button>
<button onclick="playEpisode(1)">Episode 2</button>
<button onclick="playEpisode(2)">Episode 3</button>

<hr>

<!-- ⬅️ ➡️ Buttons -->
<button onclick="prevEpisode()">⬅️ Previous</button>
<button onclick="nextEpisode()">Next ➡️</button>

<script>
const episodes = [
  "https://res.cloudinary.com/your-cloud/video/upload/episode1.mp4",
  "https://res.cloudinary.com/your-cloud/video/upload/episode2.mp4",
  "https://res.cloudinary.com/your-cloud/video/upload/episode3.mp4"
];

let current = 0;

// 🎬 play episode
function playEpisode(index) {
  current = index;
  let player = document.getElementById("player");
  player.src = episodes[current];
  player.play();
}

// ⬅️ previous
function prevEpisode() {
  if (current > 0) {
    current--;
    playEpisode(current);
  }
}

// ➡️ next
function nextEpisode() {
  if (current < episodes.length - 1) {
    current++;
    playEpisode(current);
  }
}
</script>
